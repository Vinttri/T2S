  <rect x="72"  y="158" width="56" height="132" rx="4" fill="#8b949e" fill-opacity="0.18"/>
  <rect x="72"  y="158" width="56" height="132" rx="4" fill="#2ea043"/>
  <text x="100" y="150" font-size="12" font-weight="600" fill="#8b949e" text-anchor="middle">3/3</text>
