  <text x="280" y="310" font-size="12" fill="#8b949e" text-anchor="middle">Hard</text>

  <!-- Extra-Hard 2/3 : total 132 (y158) pass 88 (y202) -->
  <rect x="342" y="158" width="56" height="132" rx="4" fill="#8b949e" fill-opacity="0.18"/>
  <rect x="342" y="202" width="56" height="88"  rx="4" fill="#2ea043"/>
