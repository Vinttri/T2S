  <text x="370" y="310" font-size="11" fill="#8b949e" text-anchor="middle">Extra-Hard</text>

  <!-- ===== right: headline stats ===== -->
  <line x1="460" y1="80" x2="460" y2="300" stroke="#8b949e" stroke-opacity="0.20" stroke-width="1"/>

  <text x="610" y="138" font-size="44" font-weight="800" fill="#4c8eda" text-anchor="middle">11/14</text>
  <text x="610" y="162" font-size="13" fill="#8b949e" text-anchor="middle">Analytical benchmark · 79% L4</text>

  <line x1="510" y1="196" x2="710" y2="196" stroke="#8b949e" stroke-opacity="0.18" stroke-width="1"/>

  <text x="610" y="252" font-size="44" font-weight="800" fill="#2ea043" text-anchor="middle">14/14</text>
  <text x="610" y="276" font-size="13" fill="#8b949e" text-anchor="middle">Factual benchmark · 100%</text>

  <text x="610" y="320" font-size="11" fill="#8b949e" text-anchor="middle">non-L4 = gold↮knowledge conflicts, not pipeline failures</text>
