  <text x="190" y="310" font-size="12" fill="#8b949e" text-anchor="middle">Moderate</text>

  <!-- Hard 3/5 : total 220 (y70) pass 132 (y158) -->
  <rect x="252" y="70"  width="56" height="220" rx="4" fill="#8b949e" fill-opacity="0.18"/>
  <rect x="252" y="158" width="56" height="132" rx="4" fill="#2ea043"/>
