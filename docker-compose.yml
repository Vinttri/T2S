# T2S v1.0 — local Mac (arm64) stack: Postgres (source DB) + T2S app (FalkorDB embedded).
# Bring up:   docker compose up -d --build
# App UI/API: http://localhost:5000
services:
  postgres:
    image: postgres:15
    container_name: t2s-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: t2s
      POSTGRES_PASSWORD: t2s
      POSTGRES_DB: sports_events_large      # => FalkorDB graph name will be dev_sports_events_large
    volumes:
      - t2s_pg_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro   # seeds the sports DB on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U t2s -d sports_events_large"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Embedding model as its own container (part of the delivery). Auto-uses a GPU
  # when one is reachable (CUDA in-container); CPU otherwise. Settings are fixed.
  embeddings:
    build:
      context: .
      dockerfile: Dockerfile.embeddings
    image: t2s-embeddings:local
    container_name: t2s-embeddings
    restart: unless-stopped
    # To pass an NVIDIA GPU through, run on a host with the NVIDIA container
    # runtime and uncomment the block below. On Apple Silicon the container runs
    # on CPU (Docker on macOS cannot expose Metal/MLX to a Linux container).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: ["gpu"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7997/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  t2s:
    build: .
    image: t2s:local
    container_name: t2s-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AUTH_DISABLED: "true"            # dev user "dev", CSRF skipped -> simple local indexing
      FALKORDB_DATA_DIR: /var/lib/falkordb/data
      PORT: "5000"
      # user_rules emptied (owner decision): no built-in default craft-rules.
      # The template's S/P-rules still guide generation; this tests whether the
      # generator needs the separate user_rules at all. Re-enable to restore.
      QW_DEFAULT_USER_RULES_ENABLED: "false"
      # LLM rule-gate DISABLED. The 14-case bench showed a post-hoc LLM rewrite
      # of already-correct SQL is net-negative on the weak local model (it
      # mangled a JSONB path and applied KB ">10" when a question said ">=5").
      # General behavioral guidance now lives in user_rules and shapes the
      # GENERATOR directly; the deterministic sqlglot gate stays as the safety
      # net. Re-enable for a genuine post-hoc user-preference pass on a stronger
      # model. (RULE_GATE_ON_BUSINESS_RULES also off, moot while gate disabled.)
      RULE_GATE_ENABLED: "false"
      RULE_GATE_ON_BUSINESS_RULES: "false"
      # Embeddings — ZERO-CONFIG DEFAULT is the bundled CPU sibling container
      # (t2s-embeddings: Qwen3-Embedding-0.6B, 1024-d). If you set EMBEDDING_* in
      # .env (or pass install.sh --embedding-api-base ...), those win and T2S uses
      # your endpoint instead. Changing model/dimension requires a re-index
      # (the graph is indexed in one embedding space).
      EMBEDDING_API_BASE: "${EMBEDDING_API_BASE:-http://embeddings:7997/v1}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-local}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-openai/qwen3-embedding}"
      EMBEDDING_DIMENSION: "${EMBEDDING_DIMENSION:-1024}"
      EMBEDDING_TIMEOUT_SECONDS: "${EMBEDDING_TIMEOUT_SECONDS:-120}"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host LM Studio (completion LLM) at :1234
    ports:
      - "${APP_PORT:-5000}:5000"       # UI + API on http://localhost:${APP_PORT:-5000} (set via install.sh --port)
    volumes:
      - t2s_graph_data:/var/lib/falkordb/data   # persists indexed graph + embeddings + rules
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5000/auth-status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

volumes:
  t2s_pg_data:
  t2s_graph_data:

# Named network so the separate test-platform stack can attach (external) and
# reach the app + Postgres by container name (t2s-app, t2s-postgres).
networks:
  default:
    name: t2s-net
